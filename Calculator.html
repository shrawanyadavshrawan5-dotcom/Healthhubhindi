<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator - Health Hub Hindi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌿 Health Hub Hindi</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="calculator.html">BMI Calculator</a>
            <a href="chatbot.html">AI Doctor</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2>BMI Calculator</h2>
            <p>2 sec me jaane aap fit hain ya nahi</p>
            <label>Weight Kg me:</label>
            <input type="number" id="weight" placeholder="70">
            <label>Height CM me:</label>
            <input type="number" id="height" placeholder="170">
            <button onclick="calcBMI()">BMI Check Kare</button>
            <h3 id="result" style="text-align:center; color:#2e8b57; margin-top:15px;"></h3>
        </div>
    </div>
    <footer><p>© 2026 Health Hub Hindi</p></footer>

<script>
function calcBMI(){
    let w = document.getElementById('weight').value;
    let h = document.getElementById('height').value / 100;
    if(w=='' || h==''){alert("Weight aur Height dale"); return;}
    let bmi = (w / (h*h)).toFixed(2);
    let msg = bmi < 18.5? "Kam Vajan" : bmi < 24.9? "Normal - Fit Hain!" : bmi < 29.9? "Overweight" : "Motaapa";
    document.getElementById('result').innerHTML = `Aapka BMI: ${bmi} <br> Status: ${msg}`;
}
</script>
</body>
</html>
